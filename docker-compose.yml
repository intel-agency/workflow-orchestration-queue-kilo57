# OS-APOW Docker Compose
# Development and production configurations

services:
  notifier:
    build:
      context: .
      target: development
    ports:
      - "8000:8000"
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    profiles:
      - dev
      - full

  sentinel:
    build:
      context: .
      target: development
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_ORG=${GITHUB_ORG}
      - GITHUB_REPO=${GITHUB_REPO}
      - SENTINEL_BOT_LOGIN=${SENTINEL_BOT_LOGIN:-}
    volumes:
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["python", "-m", "src.orchestrator_sentinel"]
    restart: unless-stopped
    depends_on:
      notifier:
        condition: service_healthy
        required: false
    profiles:
      - full

  # Production configuration
  notifier-prod:
    build:
      context: .
      target: production
    ports:
      - "8000:8000"
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always
    profiles:
      - prod

  sentinel-prod:
    build:
      context: .
      target: production
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_ORG=${GITHUB_ORG}
      - GITHUB_REPO=${GITHUB_REPO}
      - SENTINEL_BOT_LOGIN=${SENTINEL_BOT_LOGIN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["python", "-m", "src.orchestrator_sentinel"]
    restart: always
    profiles:
      - prod

networks:
  default:
    name: os-apow-network
